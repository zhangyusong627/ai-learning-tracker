<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 学习计划追踪</title>
  <link rel="stylesheet" href="lib/prism-tomorrow.min.css">
  <style>
    /* ===== Reset & Base ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== Background Effects ===== */
    .bg-grid {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }
    .bg-glow {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      filter: blur(120px); opacity: 0.15; z-index: 0; pointer-events: none;
    }
    .bg-glow-1 { top: -200px; left: -100px; background: #6366f1; }
    .bg-glow-2 { bottom: -200px; right: -100px; background: #ec4899; }

    /* ===== Container ===== */
    .container {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto; padding: 40px 20px;
    }

    /* ===== Hero Header ===== */
    .hero {
      text-align: center; padding: 50px 30px; margin-bottom: 40px;
      background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(236,72,153,0.1));
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(135deg, #6366f1, #ec4899, #6366f1);
      border-radius: 21px; z-index: -1; opacity: 0.3;
      animation: borderGlow 4s ease-in-out infinite;
    }
    @keyframes borderGlow {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }
    .hero-tag {
      display: inline-block; padding: 6px 16px; margin-bottom: 16px;
      background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3);
      border-radius: 20px; font-size: 12px; color: #818cf8;
      letter-spacing: 2px; text-transform: uppercase;
    }
    .hero h1 {
      font-size: 32px; font-weight: 700;
      background: linear-gradient(135deg, #c7d2fe 0%, #f0abfc 50%, #93c5fd 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 10px;
    }
    .hero p { color: #94a3b8; font-size: 15px; }

    /* ===== Progress Ring ===== */
    .progress-section {
      display: flex; align-items: center; justify-content: center;
      gap: 40px; margin-top: 30px; flex-wrap: wrap;
    }
    .ring-wrap { position: relative; width: 100px; height: 100px; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: rgba(99,102,241,0.1); stroke-width: 6; }
    .ring-fill {
      fill: none; stroke: url(#ringGrad); stroke-width: 6;
      stroke-linecap: round; stroke-dasharray: 264; stroke-dashoffset: 264;
      transition: stroke-dashoffset 1s ease;
    }
    .ring-text {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 22px; font-weight: 700; color: #c7d2fe;
    }

    /* ===== Stats Cards ===== */
    .stat-cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .stat-card {
      padding: 14px 20px; border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      text-align: center; min-width: 80px;
    }
    .stat-card .num { font-size: 22px; font-weight: 700; }
    .stat-card .label { font-size: 11px; color: #64748b; margin-top: 2px; }
    .stat-card.done .num { color: #34d399; }
    .stat-card.active .num { color: #fbbf24; }
    .stat-card.pending .num { color: #64748b; }

    /* ===== Module Tabs ===== */
    .module-tabs {
      display: flex; gap: 8px; margin-bottom: 30px;
      padding: 4px; background: rgba(255,255,255,0.03);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.06);
      overflow-x: auto;
    }
    .module-tab {
      flex: 1; padding: 10px 12px; border-radius: 10px;
      text-align: center; cursor: pointer; transition: all 0.3s;
      font-size: 13px; color: #64748b; white-space: nowrap;
      border: 1px solid transparent; min-width: 0;
    }
    .module-tab:hover { color: #94a3b8; }
    .module-tab.active {
      background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(236,72,153,0.2));
      color: #e2e8f0; border-color: rgba(99,102,241,0.3);
    }
    .module-tab .tab-icon { font-size: 18px; display: block; margin-bottom: 4px; }

    /* ===== Timeline ===== */
    .timeline { position: relative; padding-left: 40px; }
    .timeline::before {
      content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(to bottom, #6366f1, #ec4899, rgba(99,102,241,0.1));
    }

    /* ===== Timeline Node ===== */
    .tl-node { position: relative; margin-bottom: 20px; }
    .tl-dot {
      position: absolute; left: -40px; top: 18px;
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #1e1b4b; z-index: 2;
    }
    .tl-dot::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 6px; height: 6px; border-radius: 50%;
    }
    .tl-dot.done { background: #34d399; box-shadow: 0 0 12px rgba(52,211,153,0.4); }
    .tl-dot.done::after { background: #fff; }
    .tl-dot.active { background: #fbbf24; box-shadow: 0 0 12px rgba(251,191,36,0.4); animation: pulse 2s infinite; }
    .tl-dot.active::after { background: #fff; }
    .tl-dot.pending { background: #1e293b; }
    .tl-dot.pending::after { background: #334155; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 12px rgba(251,191,36,0.4); }
      50% { box-shadow: 0 0 24px rgba(251,191,36,0.6); }
    }

    /* ===== Week Card ===== */
    .week-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; padding: 20px;
      transition: all 0.3s; cursor: pointer;
      position: relative; overflow: hidden;
    }
    .week-card:hover {
      border-color: rgba(99,102,241,0.3);
      background: rgba(255,255,255,0.05);
      transform: translateX(4px);
    }
    .week-card.active-card {
      border-color: rgba(251,191,36,0.3);
      background: rgba(251,191,36,0.03);
    }
    .week-card.active-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
    }
    .week-card.today-card {
      border-color: rgba(99,102,241,0.4);
      box-shadow: 0 0 20px rgba(99,102,241,0.1);
    }

    .week-header-right { display: flex; align-items: center; gap: 8px; }
    .today-tag {
      padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700;
      background: rgba(99,102,241,0.2); color: #818cf8;
      border: 1px solid rgba(99,102,241,0.3);
      animation: todayPulse 2s ease-in-out infinite;
    }
    @keyframes todayPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .date-range { font-size: 11px; color: #64748b; }

    .topic-chip.weekend {
      background: rgba(236,72,153,0.08); border-color: rgba(236,72,153,0.15);
      color: #f9a8d4;
    }

    .week-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .week-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 8px;
      font-size: 12px; font-weight: 600;
    }
    .week-badge.done { background: rgba(52,211,153,0.1); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
    .week-badge.active { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
    .week-badge.pending { background: rgba(100,116,139,0.1); color: #64748b; border: 1px solid rgba(100,116,139,0.2); }

    .week-title { font-size: 17px; font-weight: 600; color: #e2e8f0; margin-bottom: 8px; }
    .week-topics { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .topic-chip {
      padding: 4px 10px; border-radius: 6px; font-size: 11px;
      background: rgba(255,255,255,0.05); color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.06);
      white-space: nowrap; line-height: 1.4;
    }

    /* ===== Mini Progress ===== */
    .mini-progress { display: flex; align-items: center; gap: 10px; }
    .mini-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
    .mini-bar-fill.done { background: linear-gradient(90deg, #34d399, #10b981); }
    .mini-bar-fill.active { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
    .mini-pct { font-size: 12px; color: #64748b; min-width: 32px; text-align: right; }

    /* ===== Note Preview ===== */
    .note-preview {
      margin-top: 12px; padding: 10px 14px;
      background: rgba(251,191,36,0.05);
      border-left: 2px solid rgba(251,191,36,0.3);
      border-radius: 0 8px 8px 0;
      font-size: 12px; color: #94a3b8;
      max-height: 40px; overflow: hidden;
    }
    .note-preview .note-label { color: #fbbf24; font-weight: 600; margin-right: 6px; }

    /* ===== Expanded Detail ===== */
    .week-detail {
      display: none; margin-top: 16px; padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .week-detail.open { display: block; }

    .topic-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .topic-item:last-child { border-bottom: none; }

    .topic-checkbox {
      width: 18px; height: 18px; border-radius: 4px;
      border: 2px solid #475569; background: transparent;
      cursor: pointer; flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .topic-checkbox:hover { border-color: #6366f1; }
    .topic-checkbox.checked {
      background: #6366f1; border-color: #6366f1;
    }
    .topic-checkbox.checked::after {
      content: '\2713'; color: white; font-size: 11px; font-weight: bold;
    }
    .topic-name { font-size: 14px; color: #cbd5e1; flex: 1; }
    .topic-name.done-text { text-decoration: line-through; color: #64748b; }

    .topic-note-btn {
      padding: 4px 10px; border-radius: 6px; font-size: 11px;
      background: rgba(99,102,241,0.1); color: #818cf8;
      border: 1px solid rgba(99,102,241,0.2);
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .topic-note-btn:hover { background: rgba(99,102,241,0.2); }

    /* ===== Note Editor ===== */
    .note-editor {
      display: none; margin-top: 12px; padding: 16px;
      background: rgba(0,0,0,0.2); border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .note-editor.open { display: block; }

    .note-toolbar {
      display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .note-toolbar button {
      padding: 6px 10px; border-radius: 6px; font-size: 12px;
      background: rgba(255,255,255,0.05); color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer; transition: all 0.2s;
    }
    .note-toolbar button:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }

    .note-tags { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .note-tag {
      padding: 3px 10px; border-radius: 12px; font-size: 11px;
      cursor: pointer; transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .note-tag.selected { border-color: #6366f1; background: rgba(99,102,241,0.2); color: #818cf8; }
    .note-tag:not(.selected) { color: #64748b; }

    .note-editor-area {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .note-editor-area.full-width { grid-template-columns: 1fr; }

    .note-textarea {
      width: 100%; min-height: 120px; padding: 12px;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: #e2e8f0; font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px; resize: vertical; outline: none;
    }
    .note-textarea:focus { border-color: rgba(99,102,241,0.4); }

    .note-preview-pane {
      padding: 12px; background: rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; min-height: 120px;
      font-size: 14px; line-height: 1.6; color: #cbd5e1;
      overflow-y: auto; max-height: 300px;
    }
    .note-preview-pane h1, .note-preview-pane h2, .note-preview-pane h3 { color: #e2e8f0; margin: 12px 0 6px; }
    .note-preview-pane code {
      background: rgba(99,102,241,0.1); padding: 2px 6px; border-radius: 4px;
      font-family: 'SF Mono', monospace; font-size: 13px;
    }
    .note-preview-pane pre { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; overflow-x: auto; }
    .note-preview-pane pre code { background: none; padding: 0; }
    .note-preview-pane img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
    .note-preview-pane a { color: #818cf8; }
    .note-preview-pane ul, .note-preview-pane ol { padding-left: 20px; }
    .note-preview-pane blockquote {
      border-left: 3px solid #6366f1; padding-left: 12px; color: #94a3b8;
    }

    .note-save-status {
      margin-top: 8px; font-size: 11px; color: #64748b;
      text-align: right;
    }
    .note-save-status.saving { color: #fbbf24; }
    .note-save-status.saved { color: #34d399; }

    /* ===== Weekly Note ===== */
    .weekly-note { margin-top: 16px; }
    .weekly-note-title {
      font-size: 14px; font-weight: 600; color: #94a3b8;
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }

    /* ===== Week Objective ===== */
    .week-objective {
      padding: 12px 16px; margin-bottom: 16px;
      background: rgba(99,102,241,0.06);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 10px;
    }
    .week-objective-label { font-size: 11px; color: #818cf8; font-weight: 600; margin-bottom: 4px; }
    .week-objective-text { font-size: 13px; color: #cbd5e1; line-height: 1.5; }

    /* ===== Topic Info (expanded) ===== */
    .topic-info { flex: 1; min-width: 0; }
    .topic-details { margin-top: 6px; }
    .topic-detail-row {
      font-size: 12px; color: #64748b; line-height: 1.6;
      padding: 2px 0; display: flex; gap: 6px; align-items: baseline;
    }
    .detail-label {
      font-weight: 600; color: #818cf8; white-space: nowrap; flex-shrink: 0;
    }
    .material-link {
      color: #93c5fd; text-decoration: none;
      border-bottom: 1px dashed rgba(147,197,253,0.3);
      transition: all 0.2s;
    }
    .material-link:hover { color: #c7d2fe; border-bottom-color: #c7d2fe; }
    .material-text { color: #94a3b8; }
    .material-sep { color: #475569; }

    /* ===== Image Upload ===== */
    .image-upload-input { display: none; }

    /* ===== FAB ===== */
    .fab {
      position: fixed; bottom: 30px; right: 30px;
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border: none; color: white; font-size: 24px;
      cursor: pointer; box-shadow: 0 8px 30px rgba(99,102,241,0.3);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s; z-index: 100;
    }
    .fab:hover { transform: scale(1.1); }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .container { padding: 20px 12px; }
      .hero { padding: 30px 16px; }
      .hero h1 { font-size: 20px; }
      .progress-section { gap: 20px; }
      .note-editor-area { grid-template-columns: 1fr; }
      .module-tabs { gap: 4px; padding: 3px; }
      .module-tab { padding: 8px 6px; font-size: 11px; }
      .module-tab .tab-icon { font-size: 16px; }
      .stat-cards { gap: 8px; }
      .stat-card { padding: 10px 14px; min-width: 60px; }
      .stat-card .num { font-size: 18px; }
      .week-card { padding: 14px; }
      .week-title { font-size: 15px; }
      .note-preview-pane { max-height: 200px; }
    }

    /* ===== Reminder Settings Panel ===== */
    .reminder-panel {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 1000;
      backdrop-filter: blur(8px);
      animation: fadeIn 0.2s ease;
    }
    .reminder-panel.open { display: flex; align-items: center; justify-content: center; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .reminder-content {
      width: 90%; max-width: 500px; max-height: 80vh;
      background: #1e293b; border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    .reminder-header {
      padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    .reminder-header h3 {
      font-size: 18px; font-weight: 600; color: #e2e8f0;
      margin: 0;
    }
    .reminder-close {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.05); border: none;
      color: #94a3b8; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .reminder-close:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }

    .reminder-body {
      padding: 20px 24px; overflow-y: auto; max-height: 60vh;
    }

    .reminder-section {
      margin-bottom: 24px;
    }
    .reminder-section-title {
      font-size: 13px; font-weight: 600; color: #818cf8;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }

    .channel-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 8px;
    }
    .channel-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .channel-icon.feishu { background: linear-gradient(135deg, #3370ff, #2b5fd9); }
    .channel-icon.wechat { background: linear-gradient(135deg, #07c160, #06ae56); }
    .channel-info { flex: 1; }
    .channel-name { font-size: 14px; font-weight: 500; color: #e2e8f0; }
    .channel-status { font-size: 12px; color: #64748b; }
    .channel-status.connected { color: #34d399; }

    .channel-input {
      width: 100%; padding: 10px 12px; margin-top: 8px;
      background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: #e2e8f0; font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    .channel-input:focus { border-color: #6366f1; }
    .channel-input::placeholder { color: #64748b; }

    .reminder-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 8px;
    }
    .reminder-type-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(99,102,241,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .reminder-info { flex: 1; }
    .reminder-name { font-size: 14px; color: #e2e8f0; }
    .reminder-desc { font-size: 12px; color: #64748b; margin-top: 2px; }

    .toggle-switch {
      position: relative; width: 44px; height: 24px;
      background: rgba(255,255,255,0.1); border-radius: 12px;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle-switch.active { background: #6366f1; }
    .toggle-switch::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 20px; height: 20px; border-radius: 10px;
      background: white; transition: transform 0.2s;
    }
    .toggle-switch.active::after { transform: translateX(20px); }

    .btn-primary {
      padding: 10px 20px; border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border: none; color: white; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(99,102,241,0.3); }

    .btn-test {

// ===== 初始化逻辑 =====
async function initDatabase() {
  const { data: existing } = await sb.from('weeks').select('id').limit(1);
  if (existing && existing.length > 0) return;

  for (const item of COURSE_DATA) {
    const { data: week } = await sb.from('weeks').insert({
      week_number: item.week,
      module: item.module,
      title: item.title,
      status: item.week === 1 ? 'active' : 'pending'
    }).select().single();

    for (let i = 0; i < item.days.length; i++) {
      const d = item.days[i];
      await sb.from('topics').insert({
        week_id: week.id,
        name: `${d.day} ${d.name} (${d.hours}h)`,
        completed: false,
        topic_order: i + 1
      });
    }
  }
}

// ===== "今天"计算 =====
function getTodayWeekNumber() {
  const PLAN_START = new Date('2026-06-01');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diffDays = Math.floor((today - PLAN_START) / (1000 * 60 * 60 * 24));
  if (diffDays < 0) return 0;
  return Math.floor(diffDays / 7) + 1;
}

  const { data: notes } = await sb.from('notes').select('*');
  allWeeks = weeks || [];

let currentUploadContext = {};

function triggerImageUpload(containerId, weekId, topicId) {
  currentUploadContext = { containerId, weekId, topicId };
  document.getElementById('imageUpload').click();
}

document.getElementById('imageUpload').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const { containerId, weekId, topicId } = currentUploadContext;
  const status = document.getElementById('status-' + containerId);
  status.className = 'note-save-status saving';
  status.textContent = '上传图片中...';

  const fileName = `${Date.now()}-${file.name}`;
  const { data, error } = await sb.storage.from('note-images').upload(fileName, file);

  if (error) {
    status.className = 'note-save-status';
    status.textContent = '上传失败: ' + error.message;
    return;
  }

  const { data: urlData } = sb.storage.from('note-images').getPublicUrl(fileName);
  const imageUrl = urlData.publicUrl;

  const textarea = document.getElementById('textarea-' + containerId);
  const insert = `![${file.name}](${imageUrl})\n`;
  textarea.value = textarea.value.substring(0, textarea.selectionStart) + insert + textarea.value.substring(textarea.selectionStart);
  onNoteInput(containerId, weekId, topicId);

  e.target.value = '';
});

// ===== 时间线渲染 =====
function renderTimeline() {
  const container = document.getElementById('timeline');
  const moduleWeeks = allWeeks.filter(w =>
    MODULES.find(m => m.id === currentModule)?.weeks.includes(w.week_number)
  );
  const todayWeek = getTodayWeekNumber();

  container.innerHTML = moduleWeeks.map(week => {
    const topics = allTopics.filter(t => t.week_id === week.id).sort((a, b) => a.topic_order - b.topic_order);
    const completed = topics.filter(t => t.completed).length;
    const total = topics.length;
    const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
    const weekNote = allNotes.find(n => n.week_id === week.id && !n.topic_id);
    const weekData = COURSE_DATA.find(c => c.week === week.week_number);
    const isToday = week.week_number === todayWeek;

    return `
    <div class="tl-node">
      <div class="tl-dot ${week.status}"></div>
      <div class="week-card ${week.status === 'active' ? 'active-card' : ''} ${isToday ? 'today-card' : ''}"
           onclick="toggleWeekDetail('${week.id}')">
        <div class="week-header">
          <span class="week-badge ${week.status}">
            ${week.status === 'done' ? '✓' : week.status === 'active' ? '●' : ''} 第 ${week.week_number} 周
          </span>
          <div class="week-header-right">
            ${isToday ? '<span class="today-tag">今天</span>' : ''}
            ${weekData?.dateRange ? `<span class="date-range">${weekData.dateRange}</span>` : ''}
            <span style="font-size:12px;color:${week.status === 'done' ? '#34d399' : week.status === 'active' ? '#fbbf24' : '#64748b'}">${pct}%</span>
          </div>
        </div>
        <div class="week-title">${week.title}</div>
        <div class="week-topics">
          ${topics.map(t => {
            const isWeekend = t.name.startsWith('周六') || t.name.startsWith('周日');
            return `<span class="topic-chip ${isWeekend ? 'weekend' : ''}">${t.name.replace(/\s*\(\d+h\)$/, '')}</span>`;
          }).join('')}
        </div>
        <div class="mini-progress">
          <div class="mini-bar"><div class="mini-bar-fill ${week.status}" style="width:${pct}%"></div></div>
          <div class="mini-pct">${completed}/${total}</div>
        </div>
        ${weekNote ? `<div class="note-preview"><span class="note-label">📝</span>${weekNote.content.substring(0, 60)}...</div>` : ''}
      </div>
      <div class="week-detail" id="detail-${week.id}">
        <!-- 子主题 + 笔记区（后续 Task 实现） -->
      </div>
    </div>`;
  }).join('');
}

// ===== 进度更新 =====
function updateProgress() {
  const total = allTopics.length;
  const done = allTopics.filter(t => t.completed).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const ring = document.getElementById('progressRing');
  const circumference = 2 * Math.PI * 42;
  ring.style.strokeDashoffset = circumference - (circumference * pct / 100);
  document.getElementById('progressText').textContent = pct + '%';
  const doneWeeks = allWeeks.filter(w => w.status === 'done').length;
  const activeWeeks = allWeeks.filter(w => w.status === 'active').length;
  const pendingWeeks = allWeeks.filter(w => w.status === 'pending').length;
  document.getElementById('statDone').textContent = doneWeeks;
  document.getElementById('statActive').textContent = activeWeeks;
  document.getElementById('statPending').textContent = pendingWeeks;
}

// ===== 笔记编辑器 =====
const PRESET_TAGS = ['重点', '待复习', '已掌握', '疑问'];
let saveTimers = {};

function renderNoteEditor(containerId, weekId, topicId) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const existing = allNotes.find(n =>
    n.week_id === weekId && (topicId ? n.topic_id === topicId : !n.topic_id)
  );
  const content = existing?.content || '';
  const tags = existing?.tags || [];

  container.innerHTML = `
    <div class="note-toolbar">
      <button onclick="insertMarkdown('${containerId}', 'bold')">加粗</button>
      <button onclick="insertMarkdown('${containerId}', 'italic')">斜体</button>
      <button onclick="insertMarkdown('${containerId}', 'list')">列表</button>
      <button onclick="insertMarkdown('${containerId}', 'code')">代码</button>
      <button onclick="insertMarkdown('${containerId}', 'link')">链接</button>
      <button onclick="triggerImageUpload('${containerId}', '${weekId}', '${topicId}')">图片</button>
    </div>
    <div class="note-tags" id="tags-${containerId}">
      ${PRESET_TAGS.map(t =>
        `<span class="note-tag ${tags.includes(t) ? 'selected' : ''}"
              onclick="toggleNoteTag('${containerId}', '${weekId}', '${topicId}', '${t}')">${t}</span>`
      ).join('')}
    </div>
    <div class="note-editor-area">
      <textarea class="note-textarea" id="textarea-${containerId}"
                placeholder="用 Markdown 编写笔记..."
                oninput="onNoteInput('${containerId}', '${weekId}', '${topicId}')">${content}</textarea>
      <div class="note-preview-pane" id="preview-${containerId}"></div>
    </div>
    <div class="note-save-status" id="status-${containerId}"></div>
  `;

  renderPreview(containerId, content);
}

function renderPreview(containerId, content) {
  const preview = document.getElementById('preview-' + containerId);
  if (preview) {
    preview.innerHTML = marked.parse(content || '*暂无内容*');
    preview.querySelectorAll('pre code').forEach(block => Prism.highlightElement(block));
  }
}

function insertMarkdown(containerId, type) {
  const textarea = document.getElementById('textarea-' + containerId);
  const map = {
    bold: ['**', '**'], italic: ['*', '*'],
    list: ['- ', ''], code: ['```\n', '\n```'],
    link: ['[', '](url)']
  };
  const [before, after] = map[type];
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const text = textarea.value;
  textarea.value = text.substring(0, start) + before + text.substring(start, end) + after + text.substring(end);
  textarea.focus();
  onNoteInput(containerId, null, null);
}

function onNoteInput(containerId, weekId, topicId) {
  const textarea = document.getElementById('textarea-' + containerId);
  renderPreview(containerId, textarea.value);

  if (saveTimers[containerId]) clearTimeout(saveTimers[containerId]);

  const status = document.getElementById('status-' + containerId);
  status.className = 'note-save-status saving';
  status.textContent = '保存中...';

  saveTimers[containerId] = setTimeout(async () => {
    await saveNote(containerId, weekId, topicId, textarea.value);
    status.className = 'note-save-status saved';
    status.textContent = '已保存';
    setTimeout(() => { status.textContent = ''; }, 2000);
  }, 500);
}

async function saveNote(containerId, weekId, topicId, content) {
  const existing = allNotes.find(n =>
    n.week_id === weekId && (topicId ? n.topic_id === topicId : !n.topic_id)
  );

  if (existing) {
    await sb.from('notes').update({ content, updated_at: new Date() }).eq('id', existing.id);
    existing.content = content;
  } else {
    const { data } = await sb.from('notes').insert({
      week_id: weekId, topic_id: topicId, content, tags: []
    }).select().single();
    if (data) allNotes.push(data);
  }
}

function toggleNoteTag(containerId, weekId, topicId, tag) {
  const existing = allNotes.find(n =>
    n.week_id === weekId && (topicId ? n.topic_id === topicId : !n.topic_id)
  );
  const tags = existing?.tags || [];
  const idx = tags.indexOf(tag);
  if (idx >= 0) tags.splice(idx, 1);
  else tags.push(tag);

  if (existing) {
    sb.from('notes').update({ tags }).eq('id', existing.id);
    existing.tags = tags;
  }

  const tagsContainer = document.getElementById('tags-' + containerId);
  tagsContainer.innerHTML = PRESET_TAGS.map(t =>
    `<span class="note-tag ${tags.includes(t) ? 'selected' : ''}"
          onclick="toggleNoteTag('${containerId}', '${weekId}', '${topicId}', '${t}')">${t}</span>`
  ).join('');
}

function toggleNoteEditor(weekId, topicId) {
  const editor = document.getElementById('note-editor-' + topicId);
  if (editor.classList.contains('open')) {
    editor.classList.remove('open');
  } else {
    editor.classList.add('open');
    renderNoteEditor('note-editor-' + topicId, weekId, topicId);
  }
}

// ===== 子主题勾选 =====
async function toggleTopic(topicId, completed) {
  await sb.from('topics').update({ completed }).eq('id', topicId);

  const topic = allTopics.find(t => t.id === topicId);
  if (topic) topic.completed = completed;

  updateWeekStatus(topic.week_id);
  updateProgress();
  renderTimeline();
}

async function updateWeekStatus(weekId) {
  const topics = allTopics.filter(t => t.week_id === weekId);
  const completed = topics.filter(t => t.completed).length;
  let status = 'pending';
  if (completed === topics.length && topics.length > 0) status = 'done';
  else if (completed > 0) status = 'active';

  await sb.from('weeks').update({ status }).eq('id', weekId);
  const week = allWeeks.find(w => w.id === weekId);
  if (week) week.status = status;
}

// 发送飞书通知（直接调用 Webhook）
async function sendFeishuNotification(webhookUrl, title, message) {
  const payload = {
    msg_type: 'interactive',
    card: {
      header: {
        title: { tag: 'plain_text', content: title },
        template: 'blue'
      },
      elements: [
        {
          tag: 'markdown',
          content: message
        }
      ]
    }
  };

  const response = await fetch(webhookUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  return response.ok;
}

// 发送企业微信通知（直接调用 Webhook）
async function sendWechatNotification(webhookUrl, title, message) {
  const payload = {
    msgtype: 'markdown',
    markdown: {
      content: `### ${title}\n${message}`
    }
  };

  const response = await fetch(webhookUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  return response.ok;
}

// 检查并触发提醒（浏览器端）
async function checkAndTriggerReminders() {
  const feishuChannel = channels.find(c => c.type === 'feishu' && c.webhook_url);
  const wechatChannel = channels.find(c => c.type === 'wechat' && c.webhook_url);
  const activeChannel = feishuChannel || wechatChannel;

  if (!activeChannel) return;

  for (const reminder of reminders) {
    if (!reminder.enabled) continue;

    let shouldTrigger = false;

    switch (reminder.type) {
      case 'daily':
        shouldTrigger = shouldTriggerDaily(reminder);
        break;
      case 'weekly':
        shouldTrigger = shouldTriggerWeekly(reminder);
        break;
      case 'deadline':
        shouldTrigger = shouldTriggerDeadline(reminder);
        break;
    }

    if (shouldTrigger) {
      const title = reminder.title;
      const message = reminder.message || getDefaultReminderMessage(reminder);

      let success = false;
      if (activeChannel.type === 'feishu') {
        success = await sendFeishuNotification(activeChannel.webhook_url, title, message);
      } else if (activeChannel.type === 'wechat') {
        success = await sendWechatNotification(activeChannel.webhook_url, title, message);
      }

      if (success) {
        await sb.from('reminders').update({ last_sent_at: new Date().toISOString() }).eq('id', reminder.id);
        reminder.last_sent_at = new Date().toISOString();
      }
    }
  }
}

// 检查每日提醒是否应该触发
function shouldTriggerDaily(reminder) {
  const config = reminder.config || {};
  const targetTime = config.time || '09:00';
  const [hours, minutes] = targetTime.split(':').map(Number);

  const now = new Date();
  const target = new Date();
  target.setHours(hours, minutes, 0, 0);

  // 如果已过目标时间，不触发
  if (now < target) return false;

  // 如果今天已经发送过，不触发
  if (reminder.last_sent_at) {
    const lastSent = new Date(reminder.last_sent_at);
    if (lastSent.toDateString() === now.toDateString()) {
      return false;
    }
  }

  return true;
}

// 检查每周提醒是否应该触发
function shouldTriggerWeekly(reminder) {
  const config = reminder.config || {};
  const targetDay = config.day || 'monday';
  const targetTime = config.time || '09:00';

  const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
  const [hours, minutes] = targetTime.split(':').map(Number);

  const now = new Date();
  const currentDay = days[now.getDay()];
  const target = new Date();
  target.setHours(hours, minutes, 0, 0);

  // 检查是否是目标星期几
  if (currentDay !== targetDay) return false;

  // 如果已过目标时间，不触发
  if (now < target) return false;

  // 如果今天已经发送过，不触发
  if (reminder.last_sent_at) {
    const lastSent = new Date(reminder.last_sent_at);
    if (lastSent.toDateString() === now.toDateString()) {
      return false;
    }
  }

  return true;
}

// 检查截止日期提醒是否应该触发
function shouldTriggerDeadline(reminder) {
  const config = reminder.config || {};
  const daysBefore = config.days_before || [7, 3, 1];

  // 获取课程结束日期
  const PLAN_END = new Date('2026-08-23');

  const now = new Date();
  now.setHours(0, 0, 0, 0);

  // 计算距离结束还有多少天
  const daysUntilEnd = Math.ceil((PLAN_END.getTime() - now.getTime()) / (1000 * 60 * 60 * 24));

  // 检查是否在提醒天数内
  if (!daysBefore.includes(daysUntilEnd)) return false;

  // 如果今天已经发送过，不触发
  if (reminder.last_sent_at) {
    const lastSent = new Date(reminder.last_sent_at);
    if (lastSent.toDateString() === now.toDateString()) {
      return false;
    }
  }

  return true;
}

// 获取默认提醒消息
function getDefaultReminderMessage(reminder) {
  const PLAN_END = new Date('2026-08-23');
  const now = new Date();

  switch (reminder.type) {
    case 'daily':
      return '📅 每日学习提醒\n今天也要继续加油哦！';
    case 'weekly':
      return '📊 每周进度提醒\n回顾一下本周的学习情况吧！';
    case 'deadline': {
      const daysUntilEnd = Math.ceil((PLAN_END.getTime() - now.getTime()) / (1000 * 60 * 60 * 24));
      return `⏰ 截止日期提醒\n距离课程结束还有 ${daysUntilEnd} 天，加油！`;
    }
    default:
      return reminder.message || '学习提醒';
  }
}

// 启动定时检查（每分钟检查一次）
function startReminderChecker() {
  // 页面加载时立即检查一次
  checkAndTriggerReminders();

  // 每分钟检查一次
  setInterval(checkAndTriggerReminders, 60 * 1000);
}

// 打开提醒面板
function openReminderPanel() {
  document.getElementById('reminderPanel').classList.add('open');
  renderChannelList();
  renderReminderList();
}

// 关闭提醒面板
function closeReminderPanel() {
  document.getElementById('reminderPanel').classList.remove('open');
}

// ===== 初始化入口 =====
async function init() {
  await initDatabase();
  await loadData();
  await loadReminderSettings();
  renderModuleTabs();
  renderTimeline();
  updateProgress();
  startReminderChecker();
}

init();
</script>
